<div class="row">

  <div class="col s4">

    <div class="card">
      <div class="card-content">

        <span class="card-title">Region Form</span>

        <div class="input-field">
          <input type="text" [(ngModel)]="region.name" name="name">
          <label class="active">Region Name</label>
        </div>

        <div class="input-field">

          <select [(ngModel)]="region.country" name="country" class="browser-default">

            <option [ngValue]="null" disabled selected>
              Seleccione un país
            </option>

            <option *ngFor="let c of countries" [ngValue]="c">
              {{c.name}}
            </option>

          </select>

        </div>

        <br>

        <button class="btn blue" (click)="saveRegion()">
          Save
        </button>

      </div>
    </div>

  </div>


  <div class="col s8">

    <table class="striped">

      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Country</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let r of regions">

          <td>{{r.id}}</td>
          <td>{{r.name}}</td>
          <td>{{r.country?.name}}</td>

          <td>

            <button class="btn orange">
              Edit
            </button>

            <button class="btn red">
              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- 
Puntos claves con  Materialize
class="browser-default" para que el select funcione con Materialize.

name="country" requerido para ngModel.

label class="active" para que Materialize no oculte el label.

? en r.country?.name evita errores si el country viene null.
 -->
